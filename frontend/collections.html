<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Milk Processing Center - Collections</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://cdn.datatables.net/1.13.4/css/dataTables.bootstrap5.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container-fluid">
        <a class="navbar-brand" href="index.html">
            <span class="brand-logo"><i class="fas fa-industry"></i></span>
            Milk Processing Center
        </a>
        <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
            <ul class="navbar-nav gap-1">
                <li class="nav-item"><a class="nav-link" href="index.html"><i class="fas fa-tachometer-alt"></i> Dashboard</a></li>
                <li class="nav-item"><a class="nav-link" href="farmers.html"><i class="fas fa-users"></i> Farmers</a></li>
                <li class="nav-item"><a class="nav-link active" href="collections.html"><i class="fas fa-fill-drip"></i> Collections</a></li>
                <li class="nav-item"><a class="nav-link" href="products.html"><i class="fas fa-box"></i> Products</a></li>
                <li class="nav-item"><a class="nav-link" href="orders.html"><i class="fas fa-shopping-cart"></i> Orders</a></li>
                <li class="nav-item"><a class="nav-link" href="reports.html"><i class="fas fa-chart-bar"></i> Reports</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="page-wrapper">
    <div class="page-header">
        <h1 class="page-title"><i class="fas fa-fill-drip"></i> Milk Collections</h1>
        <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#collectionModal" onclick="openAddModal()">
            <i class="fas fa-plus"></i> Add Collection
        </button>
    </div>

    <div class="card">
        <div class="card-body">
            <div class="table-responsive">
                <table id="collectionsTable" class="table table-striped table-hover w-100">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Farmer</th>
                            <th>Date</th>
                            <th>Time</th>
                            <th>Qty (L)</th>
                            <th>Fat %</th>
                            <th>SNF</th>
                            <th>Temp °C</th>
                            <th>Grade</th>
                            <th>Center</th>
                            <th class="text-center">Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr><td colspan="11" class="text-center py-4 text-muted">Loading...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<!-- Add/Edit Collection Modal -->
<div class="modal fade" id="collectionModal" tabindex="-1">
    <div class="modal-dialog modal-lg modal-dialog-centered modal-dialog-scrollable">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="collectionModalTitle"><i class="fas fa-fill-drip"></i> Add New Collection</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="collectionForm" novalidate>
                    <input type="hidden" id="collectionId">

                    <div class="modal-section-title">Collection Info</div>
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label">Farmer *</label>
                            <select class="form-select" id="farmerId" required>
                                <option value="">— Select Farmer —</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Collection Center *</label>
                            <select class="form-select" id="collectionCenterId" required>
                                <option value="">— Select Center —</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Date *</label>
                            <input type="date" class="form-control" id="collectionDate" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Time *</label>
                            <input type="time" class="form-control" id="collectionTime" required>
                        </div>
                    </div>

                    <div class="modal-section-title mt-3">Milk Quality Data</div>
                    <div class="row g-3">
                        <div class="col-md-4">
                            <label class="form-label">Quantity (Liters) *</label>
                            <input type="number" step="0.01" min="0.01" class="form-control" id="quantityLiters" placeholder="e.g. 25.50" required>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Fat % <small class="text-muted">(3.0–8.0)</small> *</label>
                            <input type="number" step="0.01" min="3.0" max="8.0" class="form-control" id="fatPercentage" placeholder="e.g. 5.2" required>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">SNF Value <small class="text-muted">(8.0–10.0)</small> *</label>
                            <input type="number" step="0.01" min="8.0" max="10.0" class="form-control" id="snfValue" placeholder="e.g. 8.9" required>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Temperature (°C) *</label>
                            <input type="number" step="0.1" class="form-control" id="temperature" placeholder="e.g. 4.5" required>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Quality Grade *</label>
                            <select class="form-select" id="qualityGrade" required>
                                <option value="A">Grade A — Excellent</option>
                                <option value="B">Grade B — Good</option>
                                <option value="C">Grade C — Acceptable</option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Collected By *</label>
                            <select class="form-select" id="collectedBy" required>
                                <option value="">— Select Employee —</option>
                            </select>
                        </div>
                        <div class="col-12">
                            <label class="form-label">Remarks</label>
                            <input type="text" class="form-control" id="remarks" placeholder="Optional notes">
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal"><i class="fas fa-times"></i> Cancel</button>
                <button type="button" class="btn btn-primary" onclick="saveCollection()"><i class="fas fa-save"></i> Save Collection</button>
            </div>
        </div>
    </div>
</div>

<!-- View Collection Modal -->
<div class="modal fade" id="viewCollectionModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header bg-info">
                <h5 class="modal-title"><i class="fas fa-eye"></i> Collection Details</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body" id="viewCollectionBody"></div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
            </div>
        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.datatables.net/1.13.4/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.datatables.net/1.13.4/js/dataTables.bootstrap5.min.js"></script>
<script src="js/collections.js"></script>
</body>
</html>
