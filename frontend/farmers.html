<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Milk Processing Center - Farmers</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://cdn.datatables.net/1.13.4/css/dataTables.bootstrap5.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container-fluid">
        <a class="navbar-brand" href="index.html">
            <span class="brand-logo"><i class="fas fa-industry"></i></span>
            Milk Processing Center
        </a>
        <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
            <ul class="navbar-nav gap-1">
                <li class="nav-item"><a class="nav-link" href="index.html"><i class="fas fa-tachometer-alt"></i> Dashboard</a></li>
                <li class="nav-item"><a class="nav-link active" href="farmers.html"><i class="fas fa-users"></i> Farmers</a></li>
                <li class="nav-item"><a class="nav-link" href="collections.html"><i class="fas fa-fill-drip"></i> Collections</a></li>
                <li class="nav-item"><a class="nav-link" href="products.html"><i class="fas fa-box"></i> Products</a></li>
                <li class="nav-item"><a class="nav-link" href="orders.html"><i class="fas fa-shopping-cart"></i> Orders</a></li>
                <li class="nav-item"><a class="nav-link" href="reports.html"><i class="fas fa-chart-bar"></i> Reports</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="page-wrapper">
    <div class="page-header">
        <h1 class="page-title"><i class="fas fa-users"></i> Farmers Management</h1>
        <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#farmerModal" onclick="openAddModal()">
            <i class="fas fa-plus"></i> Add Farmer
        </button>
    </div>

    <div class="card">
        <div class="card-body">
            <div class="table-responsive">
                <table id="farmersTable" class="table table-striped table-hover w-100">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>NIC</th>
                            <th>Full Name</th>
                            <th>Village</th>
                            <th>District</th>
                            <th>Contact</th>
                            <th>Bank</th>
                            <th>Status</th>
                            <th class="text-center">Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr><td colspan="9" class="text-center py-4 text-muted">Loading...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<!-- Add/Edit Farmer Modal -->
<div class="modal fade" id="farmerModal" tabindex="-1">
    <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="modalTitle"><i class="fas fa-user-plus"></i> Add New Farmer</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="farmerForm" novalidate>
                    <input type="hidden" id="farmerId">

                    <div class="modal-section-title">Personal Information</div>
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label">NIC Number *</label>
                            <input type="text" class="form-control" id="nicNumber" placeholder="e.g. 199012345678" required>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">First Name *</label>
                            <input type="text" class="form-control" id="firstName" required>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">Last Name *</label>
                            <input type="text" class="form-control" id="lastName" required>
                        </div>
                        <div class="col-md-8">
                            <label class="form-label">Address *</label>
                            <input type="text" class="form-control" id="address" required>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Status</label>
                            <select class="form-select" id="status">
                                <option value="Active">Active</option>
                                <option value="Inactive">Inactive</option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Village *</label>
                            <input type="text" class="form-control" id="village" required>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">District *</label>
                            <input type="text" class="form-control" id="district" required>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Contact Number *</label>
                            <input type="text" class="form-control" id="contactNumber" placeholder="07XXXXXXXX" required>
                        </div>
                        <div class="col-md-12">
                            <label class="form-label">Email</label>
                            <input type="email" class="form-control" id="email" placeholder="optional">
                        </div>
                    </div>

                    <div class="modal-section-title mt-3">Bank Details</div>
                    <div class="row g-3">
                        <div class="col-md-4">
                            <label class="form-label">Bank Name *</label>
                            <input type="text" class="form-control" id="bankName" required>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Account Number *</label>
                            <input type="text" class="form-control" id="bankAccountNo" required>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Branch *</label>
                            <input type="text" class="form-control" id="bankBranch" required>
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal"><i class="fas fa-times"></i> Cancel</button>
                <button type="button" class="btn btn-primary" onclick="saveFarmer()"><i class="fas fa-save"></i> Save Farmer</button>
            </div>
        </div>
    </div>
</div>

<!-- View Farmer Modal -->
<div class="modal fade" id="viewFarmerModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header bg-info">
                <h5 class="modal-title"><i class="fas fa-id-card"></i> Farmer Details</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body" id="viewFarmerBody"></div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
            </div>
        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.datatables.net/1.13.4/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.datatables.net/1.13.4/js/dataTables.bootstrap5.min.js"></script>
<script src="js/auth.js"></script>
<script src="js/farmers.js"></script>
</body>
</html>
