<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Milk Processing Center - Products</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://cdn.datatables.net/1.13.4/css/dataTables.bootstrap5.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container-fluid">
        <a class="navbar-brand" href="index.html">
            <span class="brand-logo"><i class="fas fa-industry"></i></span>
            Milk Processing Center
        </a>
        <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
            <ul class="navbar-nav gap-1">
                <li class="nav-item"><a class="nav-link" href="index.html"><i class="fas fa-tachometer-alt"></i> Dashboard</a></li>
                <li class="nav-item"><a class="nav-link" href="farmers.html"><i class="fas fa-users"></i> Farmers</a></li>
                <li class="nav-item"><a class="nav-link" href="collections.html"><i class="fas fa-fill-drip"></i> Collections</a></li>
                <li class="nav-item"><a class="nav-link active" href="products.html"><i class="fas fa-box"></i> Products</a></li>
                <li class="nav-item"><a class="nav-link" href="orders.html"><i class="fas fa-shopping-cart"></i> Orders</a></li>
                <li class="nav-item"><a class="nav-link" href="reports.html"><i class="fas fa-chart-bar"></i> Reports</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="page-wrapper">
    <div class="page-header">
        <h1 class="page-title"><i class="fas fa-box-open"></i> Products Management</h1>
        <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#productModal" onclick="openAddModal()">
            <i class="fas fa-plus"></i> Add Product
        </button>
    </div>

    <div class="card">
        <div class="card-body">
            <div class="table-responsive">
                <table id="productsTable" class="table table-striped table-hover w-100">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Code</th>
                            <th>Product Name</th>
                            <th>Category</th>
                            <th>Unit</th>
                            <th>Price (Rs.)</th>
                            <th>Shelf Life</th>
                            <th>Status</th>
                            <th class="text-center">Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr><td colspan="9" class="text-center py-4 text-muted">Loading...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<!-- Add/Edit Product Modal -->
<div class="modal fade" id="productModal" tabindex="-1">
    <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="productModalTitle"><i class="fas fa-box"></i> Add New Product</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="productForm" novalidate>
                    <input type="hidden" id="productId">

                    <div class="modal-section-title">Product Information</div>
                    <div class="row g-3">
                        <div class="col-md-4">
                            <label class="form-label">Product Code *</label>
                            <input type="text" class="form-control" id="productCode" placeholder="e.g. FM001" required>
                        </div>
                        <div class="col-md-8">
                            <label class="form-label">Product Name *</label>
                            <input type="text" class="form-control" id="productName" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Category *</label>
                            <select class="form-select" id="categoryId" required>
                                <option value="">— Select Category —</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Status</label>
                            <select class="form-select" id="productStatus">
                                <option value="Active">Active</option>
                                <option value="Discontinued">Discontinued</option>
                            </select>
                        </div>
                        <div class="col-12">
                            <label class="form-label">Description</label>
                            <textarea class="form-control" id="productDescription" rows="2" placeholder="Optional product description"></textarea>
                        </div>
                    </div>

                    <div class="modal-section-title mt-3">Pricing & Shelf Life</div>
                    <div class="row g-3">
                        <div class="col-md-4">
                            <label class="form-label">Unit *</label>
                            <select class="form-select" id="productUnit" required>
                                <option value="Liter">Liter</option>
                                <option value="Piece">Piece</option>
                                <option value="Kg">Kg</option>
                                <option value="Pack">Pack</option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Unit Price (Rs.) *</label>
                            <div class="input-group">
                                <span class="input-group-text">Rs.</span>
                                <input type="number" step="0.01" min="0.01" class="form-control" id="unitPrice" required>
                            </div>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Shelf Life (days) *</label>
                            <div class="input-group">
                                <input type="number" min="1" class="form-control" id="shelfLifeDays" required>
                                <span class="input-group-text">days</span>
                            </div>
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal"><i class="fas fa-times"></i> Cancel</button>
                <button type="button" class="btn btn-primary" onclick="saveProduct()"><i class="fas fa-save"></i> Save Product</button>
            </div>
        </div>
    </div>
</div>

<!-- View Product Modal -->
<div class="modal fade" id="viewProductModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header bg-info">
                <h5 class="modal-title"><i class="fas fa-box"></i> Product Details</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body" id="viewProductBody"></div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
            </div>
        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.datatables.net/1.13.4/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.datatables.net/1.13.4/js/dataTables.bootstrap5.min.js"></script>
<script src="js/products.js"></script>
</body>
</html>
